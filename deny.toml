[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  "RUSTSEC-2026-0105",
  # RUSTSEC-2026-0173: proc-macro-error2 unmaintained. Compile-time-only proc-macro
  # helper pulled transitively; no runtime security impact. Expiry: 2026-09-01
  "RUSTSEC-2026-0173",
  { crate = "core2@0.3.3", reason = "All versions yanked; sapling-crypto 0.7.x drops core2. Expiry: 2026-07-31" },
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["provii"]
