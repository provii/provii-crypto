# git-cliff configuration for provii-crypto
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to provii-crypto will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.github.username %} by @{{ commit.github.username }}{%- endif %}\
    {% endfor %}
{% endfor %}\n
"""
# Template for the changelog footer
footer = """
<!-- Generated by git-cliff -->
"""
# Remove leading and trailing whitespace
trim = true

[git]
# Parse conventional commits
conventional_commits = true
# Filter out unconventional commits
filter_unconventional = true
# Process commits in topological order
topo_order = false
# Sort commits in ascending order
sort_commits = "oldest"
# Limit number of commits (0 = unlimited)
limit_commits = 0

# Commit message filters
commit_parsers = [
  # Skip merge commits
  { message = "^Merge", skip = true },
  # Skip CI commits
  { message = "^ci\\(", skip = true },
  # Skip dependabot
  { message = "^chore\\(deps\\)", skip = true },
  # Feature commits
  { message = "^feat", group = "Features" },
  # Fix commits
  { message = "^fix", group = "Bug Fixes" },
  # Security fixes
  { message = "^security", group = "Security" },
  # Documentation
  { message = "^docs", group = "Documentation" },
  # Performance
  { message = "^perf", group = "Performance" },
  # Refactoring
  { message = "^refactor", group = "Refactor" },
  # Testing
  { message = "^test", group = "Testing" },
  # Build system
  { message = "^build", group = "Build" },
  # Chore (general maintenance)
  { message = "^chore", group = "Miscellaneous" },
  # Breaking changes
  { message = "^.*!:", group = "Breaking Changes" },
  # Default group for unmatched commits
  { body = ".*", group = "Other" },
]

# Protect breaking change tags
protect_breaking_commits = true

# Filter commits
filter_commits = true

# Tag pattern to detect releases
tag_pattern = "v[0-9].*"

# Skip tags that match pattern
# skip_tags = ""

# Ignore tags that match pattern
# ignore_tags = ""
