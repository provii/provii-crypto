name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - '**/*.rs'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.gitignore'
  schedule:
    # Run weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version =0.22.1

      - name: Run security audit
        # Scoped denial: unsound + unmaintained classes block, default
        # vulnerability denial remains in force, yanked-only findings
        # surface as warnings (not failures) until the sapling-crypto bump
        # lands. Single ignore covers core2 transitive via sapling-crypto
        # 0.5.0 (sapling-crypto 0.7.x drops core2). Tracked in
        # the dependency-audit exception notes. Expiry: 2026-07-31.
        run: |
          cargo audit \
            --deny unsound \
            --deny unmaintained \
            --ignore RUSTSEC-2026-0105 \
            --ignore RUSTSEC-2026-0173

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          allow-dependencies-licenses: 'pkg:cargo/ring'

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'schedule' || github.repository == 'provii/provii-crypto'
    env:
      HAS_SEMGREP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN != '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Semgrep
        run: pip install semgrep==1.139.0

      - name: Run Semgrep (blocking pass)
        if: ${{ env.HAS_SEMGREP_TOKEN == 'true' }}
        run: |
          semgrep \
            --config p/rust \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/ \
            --error \
            --severity ERROR \
            .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep (local rules only, no token)
        if: ${{ env.HAS_SEMGREP_TOKEN != 'true' }}
        run: |
          semgrep \
            --config .semgrep/ \
            --error \
            --severity ERROR \
            .

      - name: Run Semgrep (SARIF pass)
        if: ${{ always() && env.HAS_SEMGREP_TOKEN == 'true' }}
        run: |
          semgrep \
            --config p/rust \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/ \
            --sarif \
            --output semgrep.sarif \
            . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: ${{ always() && env.HAS_SEMGREP_TOKEN == 'true' }}
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE_KEY }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -C /tmp -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --exit-code 1

  supply-chain:
    name: Supply Chain Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Verify Cargo.lock exists
        run: |
          if [[ ! -f Cargo.lock ]]; then
            echo "::error::Cargo.lock missing - required for reproducible builds"
            exit 1
          fi
          echo "Cargo.lock present"

      - name: Check for unpinned dependencies
        run: |
          # Ensure no wildcard dependencies in any Cargo.toml
          WILDCARDS=$(find . -name "Cargo.toml" -exec grep -l '= "\*"' {} \; 2>/dev/null || true)
          if [[ -n "$WILDCARDS" ]]; then
            echo "::error::Found wildcard dependencies in: $WILDCARDS"
            echo "All dependencies must be pinned to specific versions"
            exit 1
          fi
          echo "No wildcard dependencies found"

      - name: Verify lockfile integrity
        run: cargo check --workspace --locked

      - name: Check for git dependencies
        run: |
          # Warn about git dependencies (acceptable for development, not production)
          GIT_DEPS=$(grep -r 'git = "' Cargo.toml */Cargo.toml 2>/dev/null || true)
          if [[ -n "$GIT_DEPS" ]]; then
            echo "::warning::Found git dependencies:"
            echo "$GIT_DEPS"
            echo "Consider using crates.io versions for production releases"
          fi

      - name: Verify no path dependencies escape workspace
        run: |
          # Path dependencies should only reference workspace members.
          # Exclude crate-internal paths from `[[bin]]`, `[[test]]`, and
          # `[[bench]]` sections (e.g. `path = "tests/foo.rs"`) which are
          # not dependencies. Also exclude workspace self-references and
          # workspace member dependencies.
          EXTERNAL_PATHS=$(grep -r 'path = "' Cargo.toml */Cargo.toml 2>/dev/null \
            | grep -v 'fuzz/' \
            | grep -v 'path = "\.' \
            | grep -v 'path = "crypto-' \
            | grep -v 'path = "tools/' \
            | grep -v 'path = "tests/' \
            | grep -v 'path = "src/' \
            | grep -v 'path = "benches/' \
            || true)
          if [[ -n "$EXTERNAL_PATHS" ]]; then
            echo "::error::Found external path dependencies:"
            echo "$EXTERNAL_PATHS"
            exit 1
          fi
          echo "All path dependencies are within workspace"

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses and advisories
        run: |
          if [[ ! -f deny.toml ]]; then
            echo "::error::deny.toml is missing - required for cargo-deny checks"
            exit 1
          fi
          cargo deny check

  zizmor:
    name: Zizmor Actions Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          min-severity: high
          advanced-security: false

  trivy-scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          limit-severities-for-sarif: "true"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  security-summary:
    name: Security Summary
    needs: [cargo-audit, semgrep, gitleaks, supply-chain, cargo-deny, trivy-scan, dependency-review, zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check all security jobs
        env:
          CARGO_AUDIT_RESULT: ${{ needs.cargo-audit.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          SUPPLY_CHAIN_RESULT: ${{ needs.supply-chain.result }}
          CARGO_DENY_RESULT: ${{ needs.cargo-deny.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          TRIVY_SCAN_RESULT: ${{ needs.trivy-scan.result }}
        run: |
          echo "Security Audit Summary"
          echo "======================"
          echo "Cargo Audit: $CARGO_AUDIT_RESULT"
          echo "Semgrep: $SEMGREP_RESULT"
          echo "Gitleaks: $GITLEAKS_RESULT"
          echo "Supply Chain: $SUPPLY_CHAIN_RESULT"
          echo "Cargo Deny: $CARGO_DENY_RESULT"
          echo "Zizmor: $ZIZMOR_RESULT"
          echo "Dependency Review: $DEPENDENCY_REVIEW_RESULT"
          echo "Trivy FS Scan: $TRIVY_SCAN_RESULT"

          FAILED=false
          SKIPPED_UNEXPECTED=false
          for job in CARGO_AUDIT SEMGREP GITLEAKS SUPPLY_CHAIN CARGO_DENY ZIZMOR DEPENDENCY_REVIEW TRIVY_SCAN; do
            result_var="${job}_RESULT"
            result="${!result_var}"
            if [[ "$result" == "failure" ]]; then
              FAILED=true
            elif [[ "$result" == "skipped" ]]; then
              echo "::warning::${job} was skipped unexpectedly"
              SKIPPED_UNEXPECTED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "::error::Critical security checks failed"
            exit 1
          fi

          if [[ "$SKIPPED_UNEXPECTED" == "true" ]]; then
            echo ""
            echo "::warning::Some security jobs were skipped. Check workflow conditions"
          fi

          echo ""
          echo "Security audit complete"
